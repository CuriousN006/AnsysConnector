name: fluent-version-and-scheme

sessions:
  fluent:
    adapter: fluent
    profile: expert
    workspace: runs/fluent-version-and-scheme
    options:
      allow_raw_actions: true
      product_version: 261
      mode: solver
      dimension: 3
      precision: double
      processor_count: 2
      ui_mode: no_gui
      start_timeout: 180
      start_transcript: false
      cleanup_on_exit: true

steps:
  - session: fluent
    action: version
  - session: fluent
    action: scheme
    params:
      mode: string_eval
      command: "(cx-version)"
