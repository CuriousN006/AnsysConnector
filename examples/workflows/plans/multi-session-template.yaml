name: multi-session-template

sessions:
  fluent_source:
    adapter: fluent
    profile: safe
    workspace: runs/fluent-source
    options:
      product_version: 261
      mode: solver
      dimension: 3
      precision: double
      processor_count: 2
      ui_mode: no_gui
      start_timeout: 180
      start_transcript: false
      cleanup_on_exit: true

  fluent_target:
    adapter: fluent
    profile: safe
    workspace: runs/fluent-target
    options:
      product_version: 261
      mode: solver
      dimension: 3
      precision: double
      processor_count: 2
      ui_mode: no_gui
      start_timeout: 180
      start_transcript: false
      cleanup_on_exit: true

steps:
  - session: fluent_source
    action: version
    label: Inspect source session

  - session: fluent_target
    action: version
    label: Inspect target session
